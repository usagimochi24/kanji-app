<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漢字暗記ノート</title>
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="app" class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <h1 class="app-title">
                    <i data-lucide="book-open" class="icon-sky"></i>
                    漢字暗記ノート
                </h1>
                <p class="app-subtitle">静かに、深く。集中して取り組みましょう。</p>
            </div>
            <button id="toggle-dashboard" class="btn-icon">
                <i data-lucide="bar-chart-3"></i>
            </button>
        </header>

        <!-- Main Content Area -->
        <main id="main-content">
            <!-- Content will be injected here by script.js -->
        </main>

        <!-- Confirmation Modal -->
        <div id="confirm-modal" class="modal-overlay hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <div id="modal-icon-container" class="modal-icon">
                        <i data-lucide="alert-triangle"></i>
                    </div>
                    <h3 id="modal-title">タイトル</h3>
                </div>
                <p id="modal-message">メッセージ</p>
                <div class="modal-footer">
                    <button id="modal-cancel" class="btn-secondary">キャンセル</button>
                    <button id="modal-confirm" class="btn-danger">実行する</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
